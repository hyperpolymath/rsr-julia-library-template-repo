# Documenter build + (main-branch only) GitHub Pages deploy.
# Flagship-rubric dimension 5 (Documentation). See docs/flagship-rubric.adoc.
#
# Per the estate required-check rule: no `on.*.paths` filter — this
# workflow always runs so it is never stuck "Expected" on unrelated PRs.

name: Documentation

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs (Documenter, with doctests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: '1.10'

      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v2

      - name: Build documentation (doctest=true)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
