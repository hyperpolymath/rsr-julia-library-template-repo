# Julia test gate (required check) — flagship-rubric dimensions 1-3
# (Correctness & tests, Aqua, JET). See docs/flagship-rubric.adoc.
#
# Per the estate required-check rule: no `on.*.paths` filter on a required
# gate — a path-filtered required workflow that never triggers is reported
# as permanently "Expected" and blocks merges. This workflow always runs.

name: Julia Test Gate

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JULIA_NUM_THREADS: 2

jobs:
  test:
    name: Julia ${{ matrix.julia-version }} - ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.10 is the LTS floor declared in Project.toml's `[compat] julia`;
        # '1' resolves to the current stable release.
        julia-version: ['1.10', '1']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@e33b4bfa0ea7cd9caedd7cb82b0e36956ef40285 # v2

      - name: Instantiate / Build / Precompile / Test
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.build(); Pkg.precompile(); Pkg.test()'

  test-nightly:
    name: Julia nightly - ubuntu-latest
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: nightly

      - uses: julia-actions/cache@e33b4bfa0ea7cd9caedd7cb82b0e36956ef40285 # v2

      - name: Instantiate / Build / Precompile / Test
        run: julia --project=. -e 'using Pkg; Pkg.instantiate(); Pkg.build(); Pkg.precompile(); Pkg.test()'
